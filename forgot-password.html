<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password | Vidlyra Fest 2026</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#081226;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    width:350px;
    background:#13284d;
    padding:30px;
    border-radius:15px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

p{
    text-align:center;
    color:#cccccc;
    font-size:14px;
}

input{
    width:100%;
    padding:12px;
    margin:15px 0;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#00bfff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0099dd;
}

.auth-links{
    margin-top:20px;
    text-align:center;
}

.auth-links a{
    color:#00bfff;
    text-decoration:none;
    font-weight:bold;
}

.auth-links a:hover{
    text-decoration:underline;
}

#message{
    margin-top:15px;
    text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h2>Forgot Password</h2>

<p>
Enter your registered email address to receive a password reset link.
</p>

<input
type="email"
id="email"
placeholder="Email Address">

<button onclick="resetPassword()">
Send Reset Link
</button>

<div class="auth-links">

<p>
Remember your password?
<a href="login.html">
Login
</a>
</p>

</div>

<p id="message"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/forgot-password.js"></script>

</body>
</html>
