<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vidlyra Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(rgba(4,12,28,.94),rgba(4,12,28,.94)),
radial-gradient(circle at top,#00E5FF22,transparent 40%);

color:#fff;

min-height:100vh;

overflow-x:hidden;

}

/*==========================
HEADER
===========================*/

header{

width:100%;

padding:20px 40px;

display:flex;

justify-content:space-between;

align-items:center;

background:#081226;

border-bottom:1px solid rgba(255,255,255,.08);

position:sticky;

top:0;

z-index:100;

}

.logo{

font-size:30px;

font-weight:700;

letter-spacing:2px;

color:#00E5FF;

}

.logout{

background:#ff3b5c;

border:none;

color:#fff;

padding:12px 22px;

border-radius:10px;

cursor:pointer;

font-weight:600;

transition:.3s;

}

.logout:hover{

transform:translateY(-2px);

}

/*==========================
CONTAINER
===========================*/

.dashboard{

max-width:1350px;

margin:auto;

padding:40px 20px;

}

/*==========================
WELCOME
===========================*/

.welcome{

font-size:40px;

font-weight:700;

margin-bottom:35px;

}

/*==========================
STATS
===========================*/

.stats{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:35px;

}

.stat-card{

background:#13284d;

padding:25px;

border-radius:18px;

border:1px solid rgba(255,255,255,.08);

transition:.35s;

text-align:center;

}

.stat-card:hover{

transform:translateY(-8px);

box-shadow:0 0 25px rgba(0,229,255,.25);

}

.stat-card h3{

color:#00E5FF;

margin-bottom:12px;

}

.stat-card p{

font-size:22px;

font-weight:700;

color:#FFD54A;

}

/*==========================
GRID
===========================*/

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(340px,1fr));

gap:25px;

}

/*==========================
CARD
===========================*/

.card{

background:#13284d;

border-radius:20px;

padding:25px;

border:1px solid rgba(255,255,255,.08);

transition:.3s;

}

.card:hover{

transform:translateY(-6px);

}

.card h2{

margin-bottom:20px;

color:#00E5FF;

}

/*==========================
DIGITAL PASS
===========================*/

.ticket-card{

position:relative;

overflow:hidden;

background:linear-gradient(135deg,#102446,#081226,#16396c);

border:2px solid #00E5FF;

box-shadow:0 0 35px rgba(0,229,255,.35);

}

.ticket-card::before{

content:"";

position:absolute;

width:250%;

height:250%;

left:-80%;

top:-80%;

background:linear-gradient(

45deg,

transparent,

rgba(255,255,255,.12),

transparent

);

animation:rotateGlow 8s linear infinite;

}

@keyframes rotateGlow{

100%{

transform:rotate(360deg);

}

}

.ticket-header{

position:relative;

z-index:2;

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

}

.ticket-header h2{

margin:0;

font-size:26px;

}

.badge{

padding:10px 18px;

border-radius:50px;

background:#00E676;

color:#081226;

font-weight:700;

}

.ticket-body{

position:relative;

z-index:2;

display:flex;

justify-content:space-between;

align-items:center;

gap:30px;

flex-wrap:wrap;

}

.ticket-left{

flex:1;

min-width:220px;

}

.ticket-left h3{

font-size:28px;

margin-bottom:20px;

color:#FFD54A;

}

.ticket-left p{

margin:12px 0;

line-height:1.7;

}

.ticket-right{

display:flex;

justify-content:center;

align-items:center;

}

#qrcode{

background:#fff;

padding:14px;

border-radius:15px;

}

.button{

margin-top:18px;

display:inline-block;

padding:12px 22px;

background:#00E5FF;

color:#081226;

text-decoration:none;

font-weight:700;

border:none;

border-radius:10px;

cursor:pointer;

transition:.3s;

}

.button:hover{

transform:translateY(-3px);

}

#myEvents p{

margin:10px 0;

}

@media(max-width:768px){

header{

padding:18px;

}

.logo{

font-size:24px;

}

.welcome{

font-size:30px;

}

.ticket-body{

flex-direction:column;

text-align:center;

}

}

</style>

</head>

<body>

<header>

<div class="logo">

VIDLYRA FEST 2026

</div>

<button class="logout" onclick="logout()">

Logout

</button>

</header>

<div class="dashboard">
