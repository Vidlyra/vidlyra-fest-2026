<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Vidlyra Fest 2026</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#081226;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    width:350px;
    background:#13284d;
    padding:30px;
    border-radius:15px;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#00bfff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0099dd;
}

#message{
    margin-top:15px;
    text-align:center;
}
</style>

</head>

<body>

<div class="container">

<h2>Vidlyra Fest 2026</h2>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<!-- Forgot Password -->
<p style="text-align:center; margin-top:15px;">
    <a href="forgot-password.html"
       style="color:#00bfff; text-decoration:none;">
        Forgot Password?
    </a>
</p>

<!-- Sign Up -->
<p style="text-align:center;">
    Don't have an account?
    <a href="signup.html"
       style="color:#00bfff; font-weight:bold; text-decoration:none;">
        Sign Up
    </a>
</p>

<p id="message"></p>
<p id="message"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/login.js"></script>

</body>
</html>
