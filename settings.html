<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Settings | Vidlyra Fest</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#081226;
color:white;
display:flex;
justify-content:center;
padding:40px;
}

.card{

width:420px;

background:#13284d;

padding:30px;

border-radius:15px;

}

h2{

text-align:center;

margin-bottom:25px;

}

.info{

margin:15px 0;

}

.info strong{

display:block;

color:#00E5FF;

margin-bottom:5px;

}

.button{

display:block;

width:100%;

padding:12px;

margin-top:15px;

border:none;

border-radius:8px;

background:#00bfff;

color:white;

cursor:pointer;

font-size:16px;

}

.logout{

background:#ff4444;

}

</style>

</head>

<body>

<div class="card">

<h2>Account Settings</h2>

<div class="info">

<strong>Name</strong>

<p id="name">Loading...</p>

</div>

<div class="info">

<strong>Email</strong>

<p id="email">Loading...</p>

</div>

<div class="info">

<strong>Membership</strong>

<p id="pass">Loading...</p>

</div>

<button class="button"
onclick="location.href='avatars.html'">

Change Avatar

</button>

<button class="button"
onclick="location.href='reset-password.html'">

Change Password

</button>

<button class="button logout"
onclick="logout()">

Logout

</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/settings.js"></script>

</body>
</html>
