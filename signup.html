<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up | Vidlyra Fest 2026</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#081226;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
width:380px;
background:#13284d;
padding:35px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,229,255,.2);
}

h2{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
outline:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#00bfff;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#0099dd;
}

.auth-links{
margin-top:20px;
text-align:center;
}

.auth-links a{
color:#00E5FF;
text-decoration:none;
}

#message{
margin-top:15px;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h2>Create Vidlyra Account</h2>

<input
type="text"
id="fullname"
placeholder="Full Name">

<input
type="email"
id="email"
placeholder="Email Address">

<input
type="password"
id="password"
placeholder="Password">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">

<button onclick="signup()">
Create Account
</button>

<div class="auth-links">

<p>

Already have an account?

<a href="login.html">

Login

</a>

</p>

</div>

<p id="message"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/signup.js"></script>

</body>
</html>
