<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Frequency Avatars</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:#081226;
color:white;
padding:40px;

}

h1{

text-align:center;
font-size:42px;
margin-bottom:10px;
color:#00E5FF;

}

.subtitle{

text-align:center;
margin-bottom:40px;
color:#bbb;

}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));

gap:25px;

}

.avatar{

background:#13284d;

padding:20px;

border-radius:20px;

text-align:center;

border:1px solid rgba(255,255,255,.08);

transition:.3s;

}

.avatar:hover{

transform:translateY(-8px);

box-shadow:0 0 20px rgba(0,229,255,.3);

}

.avatar img{

width:120px;
height:120px;

border-radius:50%;

object-fit:cover;

border:3px solid #00E5FF;

}

.avatar h3{

margin-top:15px;

}

button{

margin-top:15px;

padding:10px 18px;

border:none;

border-radius:8px;

cursor:pointer;

background:#00E5FF;

font-weight:bold;

}

</style>

</head>

<body>

<h1>Frequency Avatars</h1>

<p class="subtitle">

Choose your official Vidlyra Avatar

</p>

<div class="grid" id="avatarGrid">

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/avatars.js"></script>

</body>

</html>
