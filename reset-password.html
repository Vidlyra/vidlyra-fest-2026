<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password | Vidlyra Fest 2026</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#081226;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    width:350px;
    background:#13284d;
    padding:30px;
    border-radius:15px;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:12px 0;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#00bfff;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0099dd;
}

#message{
    margin-top:15px;
    text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h2>Create New Password</h2>

<input
type="password"
id="password"
placeholder="New Password">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">

<button onclick="updatePassword()">
Update Password
</button>

<p id="message"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/reset-password.js"></script>

</body>
</html>
