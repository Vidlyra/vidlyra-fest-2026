<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vidlyra Admin</title>

<style>

body{

margin:0;

background:#081226;

font-family:Arial,sans-serif;

color:white;

}

header{

padding:20px;

background:#102446;

display:flex;

justify-content:space-between;

align-items:center;

}

.logo{

font-size:28px;

font-weight:bold;

color:#00E5FF;

}

.logout{

padding:10px 18px;

background:#ff3b5c;

border:none;

color:white;

border-radius:8px;

cursor:pointer;

}

.container{

padding:30px;

}

.search{

width:100%;

padding:15px;

border-radius:10px;

border:none;

margin-bottom:25px;

font-size:16px;

}

table{

width:100%;

border-collapse:collapse;

}

th{

background:#00E5FF;

color:#081226;

padding:15px;

}

td{

padding:15px;

border-bottom:1px solid rgba(255,255,255,.1);

}

tr:hover{

background:#13284d;

}

</style>

</head>

<body>

<header>

<div class="logo">

VIDLYRA ADMIN

</div>

<button class="logout" onclick="logout()">

Logout

</button>

</header>

<div class="container">

<input

class="search"

id="search"

placeholder="Search participant..."

onkeyup="searchUser()">

<table>

<thead>

<tr>

<th>Name</th>

<th>Email</th>

<th>Pass</th>

<th>Status</th>

</tr>

</thead>

<tbody id="participants">

</tbody>

</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/admin.js"></script>

</body>

</html>
